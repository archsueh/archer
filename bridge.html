<!-- @dsCard group="Screens" name="Agent Bridge" viewport="960x620" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Archer · Agent Bridge</title>
<link rel="stylesheet" href="styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:28px;color:var(--primary);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(50% 55% at 18% 12%, #6d4b86 0%, transparent 55%),
      radial-gradient(55% 60% at 88% 22%, #355a8c 0%, transparent 55%),
      radial-gradient(70% 70% at 75% 95%, #7c4a63 0%, transparent 60%),
      radial-gradient(60% 60% at 12% 92%, #2c4a6e 0%, transparent 58%),
      linear-gradient(150deg, #1a2336 0%, #141a28 55%, #1d1726 100%);}
  .win{height:620px;max-width:960px;margin:0 auto;display:flex;flex-direction:column;border-radius:18px;overflow:hidden;
    background:rgba(22,25,32,.62);border:1px solid rgba(255,255,255,.10);
    -webkit-backdrop-filter:blur(40px) saturate(1.4);backdrop-filter:blur(40px) saturate(1.4);
    box-shadow:0 1px 0 rgba(255,255,255,.10) inset, 0 40px 90px -20px rgba(0,0,0,.65), 0 8px 30px -10px rgba(0,0,0,.5);}
  /* topbar */
  .topbar{display:flex;align-items:center;gap:12px;height:42px;flex:none;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.07);}
  .lights{display:flex;gap:8px;} .lights i{width:12px;height:12px;border-radius:50%;display:block;}
  .tb-title{font-family:var(--font-mono);font-size:12px;font-weight:700;}
  .tb-sub{font-family:var(--font-mono);font-size:11px;color:var(--secondary);}
  /* body */
  .body{flex:1;display:flex;min-height:0;}
  /* pane roster */
  .roster{width:240px;flex:none;border-right:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.18);display:flex;flex-direction:column;}
  .roster .h{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--secondary);padding:12px 14px 8px;}
  .pane{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:2px solid transparent;}
  .pane:hover{background:rgba(255,255,255,.05);}
  .pane.tgt{background:rgba(105,176,214,.12);border-left-color:var(--active-running);}
  .pane .dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .pane .meta{min-width:0;flex:1;}
  .pane .lab{font-family:var(--font-mono);font-size:12px;color:var(--primary);}
  .pane .lab .at{color:var(--active-running);}
  .pane .proc{font-family:var(--font-mono);font-size:10px;color:var(--secondary);margin-top:2px;}
  .pane .id{font-family:var(--font-mono);font-size:9.5px;color:var(--secondary);opacity:.7;}
  /* bridge log */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .log-h{display:flex;align-items:center;gap:8px;height:32px;flex:none;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.07);
    font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--secondary);}
  .log{flex:1;overflow:auto;padding:14px 16px;font-family:var(--font-mono);font-size:12px;line-height:1.7;}
  .ev{display:flex;gap:10px;margin-bottom:11px;}
  .ev .verb{flex:none;width:42px;font-weight:600;text-transform:lowercase;}
  .verb.read{color:var(--secondary);} .verb.type{color:var(--active-running);} .verb.keys{color:var(--attention);} .verb.reply{color:var(--insert);}
  .ev .body-t{min-width:0;}
  .ev .route{color:var(--secondary);}
  .ev .route b{color:var(--primary);font-weight:600;}
  .ev .txt{color:var(--primary);}
  .ev .quote{color:var(--primary);background:rgba(255,255,255,.05);padding:0 5px;}
  .ev .out{color:var(--secondary);white-space:pre-wrap;}
  /* composer */
  .composer{flex:none;border-top:1px solid rgba(255,255,255,.07);padding:12px 16px;}
  .crow{display:flex;align-items:center;gap:10px;}
  .verb-pick{display:flex;border:1px solid rgba(255,255,255,.10);}
  .verb-pick button{font-family:var(--font-mono);font-size:10.5px;padding:6px 10px;background:transparent;border:none;color:var(--secondary);cursor:pointer;}
  .verb-pick button.on{background:rgba(255,255,255,.13);color:var(--primary);}
  .tgt-chip{font-family:var(--font-mono);font-size:11.5px;color:var(--active-running);border:1px solid rgba(105,176,214,.4);padding:6px 9px;white-space:nowrap;}
  .cinput{flex:1;display:flex;align-items:center;height:30px;padding:0 10px;border:1px solid rgba(255,255,255,.10);
    font-family:var(--font-mono);font-size:12px;color:var(--primary);}
  .cinput .ph{color:var(--secondary);}
  .send{font-family:var(--font-mono);font-size:11px;font-weight:600;color:#0e1116;background:var(--active-running);border:none;padding:7px 14px;cursor:pointer;}
  .send:disabled{background:rgba(255,255,255,.10);color:var(--secondary);cursor:default;}
  .hint{font-family:var(--font-mono);font-size:9.5px;color:var(--secondary);margin-top:8px;}
  .hint b{color:var(--active-running);}
  .caret{display:inline-block;width:7px;height:13px;background:var(--active-running);vertical-align:-2px;animation:bl 1s steps(1) infinite;}
  @keyframes bl{50%{opacity:0;}}
</style>
</head>
<body>
  <div class="win">
    <div class="topbar">
      <span class="lights"><i style="background:#ED6A5E"></i><i style="background:#F4BE4F"></i><i style="background:#61C554"></i></span>
      <span class="tb-title">Agent Bridge</span>
      <span class="tb-sub">· 跨 pane 编排 · read / type / keys</span>
    </div>
    <div class="body">
      <aside class="roster">
        <div class="h">Panes · @label 寻址</div>
        <div id="paneList"></div>
      </aside>
      <section class="main">
        <div class="log-h">Bridge Log <span style="margin-left:auto;text-transform:none;letter-spacing:0;color:var(--secondary)" id="logCount"></span></div>
        <div class="log" id="log"></div>
        <div class="composer">
          <div class="crow">
            <div class="verb-pick" id="verbPick">
              <button class="on" data-verb="type">type</button>
              <button data-verb="keys">keys</button>
              <button data-verb="read">read</button>
            </div>
            <span class="tgt-chip" id="tgtChip">@codex</span>
            <div class="cinput" id="cinput"><span class="ph" id="cph">review src/auth.ts</span><span class="caret" id="caret" style="display:none"></span></div>
            <button class="send" id="sendBtn">发送</button>
          </div>
          <div class="hint">从左侧选目标 pane · <b>type</b> 输入文本 · <b>keys</b> 发送按键(Enter/C-c) · <b>read</b> 读取末尾输出 · ↵ 发送</div>
        </div>
      </section>
    </div>
  </div>

<script>
  const PANES=[
    {id:"%1", label:"claude", proc:"claude code", state:"run",  color:"var(--active-running)"},
    {id:"%2", label:"codex",  proc:"codex",       state:"wait", color:"var(--attention)"},
    {id:"%3", label:"hermes", proc:"hermes",      state:"run",  color:"var(--active-running)"},
    {id:"%4", label:"grok",   proc:"grok",  state:"idle", color:"var(--secondary)"}
  ];
  let target="codex", verb="type", buffer="";

  function renderPanes(){
    const wrap=document.getElementById("paneList"); wrap.innerHTML="";
    PANES.forEach(p=>{
      const el=document.createElement("div");
      el.className="pane"+(p.label===target?" tgt":"");
      el.innerHTML='<span class="dot" style="background:'+p.color+'"></span>'+
        '<div class="meta"><div class="lab"><span class="at">@</span>'+p.label+'</div>'+
        '<div class="proc">'+p.proc+'</div></div>'+
        '<span class="id">'+p.id+'</span>';
      el.onclick=()=>{target=p.label;renderPanes();syncChip();refreshInput();};
      wrap.appendChild(el);
    });
  }
  function syncChip(){ document.getElementById("tgtChip").textContent="@"+target; }

  const log=document.getElementById("log");
  function addEv(html){
    const ev=document.createElement("div"); ev.className="ev"; ev.innerHTML=html;
    log.appendChild(ev); log.scrollTop=log.scrollHeight;
    document.getElementById("logCount").textContent=log.children.length+" calls";
  }
  // seed: a Claude→Codex handoff (smux's signature agent-to-agent flow)
  function seed(){
    addEv('<span class="verb type">type</span><div class="body-t"><span class="route"><b>@claude</b> → <b>@codex</b></span> <span class="quote">review the auth refactor in src/auth.ts</span></div>');
    addEv('<span class="verb keys">keys</span><div class="body-t"><span class="route">→ <b>@codex</b></span> <span class="txt">Enter</span></div>');
    addEv('<span class="verb read">read</span><div class="body-t"><span class="route"><b>@claude</b> reads <b>@codex</b> 20</span><div class="out">✓ reviewed — 2 issues: missing token-expiry check (L42), race on refresh (L88)</div></div>');
    addEv('<span class="verb reply">reply</span><div class="body-t"><span class="route"><b>@codex</b> → <b>@claude</b></span> <span class="txt">patch proposed, ready to apply</span></div>');
  }

  // composer
  document.querySelectorAll("#verbPick button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#verbPick button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); verb=b.dataset.verb; refreshInput();
  });
  const cinput=document.getElementById("cinput"), cph=document.getElementById("cph"), caret=document.getElementById("caret");
  function refreshInput(){
    cph.textContent = buffer ? "" : (verb==="keys"?"Enter / C-c / Escape":verb==="read"?"行数 (默认 20)":"输入要发送给 "+target+" 的文本");
    let txt=cinput.querySelector(".typed");
    if(!txt){txt=document.createElement("span");txt.className="typed";cinput.insertBefore(txt,caret);}
    txt.textContent=buffer;
    caret.style.display="inline-block";
  }
  function send(){
    const v=buffer.trim();
    if(verb==="read"){
      const n=v||"20";
      addEv('<span class="verb read">read</span><div class="body-t"><span class="route"><b>you</b> read <b>@'+target+'</b> '+n+'</span><div class="out">… last '+n+' lines of @'+target+' captured</div></div>');
    } else if(verb==="keys"){
      if(!v) return;
      addEv('<span class="verb keys">keys</span><div class="body-t"><span class="route">→ <b>@'+target+'</b></span> <span class="txt">'+v+'</span></div>');
    } else {
      if(!v) return;
      addEv('<span class="verb type">type</span><div class="body-t"><span class="route">→ <b>@'+target+'</b></span> <span class="quote">'+v.replace(/</g,"&lt;")+'</span></div>');
    }
    buffer=""; refreshInput();
  }
  document.getElementById("sendBtn").onclick=send;
  document.addEventListener("keydown",e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(e.key==="Enter"){e.preventDefault();send();}
    else if(e.key==="Backspace"){buffer=buffer.slice(0,-1);refreshInput();}
    else if(e.key.length===1){buffer+=e.key;refreshInput();}
  });

  renderPanes(); syncChip(); seed(); refreshInput();
</script>
</body>
</html>
